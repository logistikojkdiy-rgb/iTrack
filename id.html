<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <!-- PWA Viewport & Meta Tags -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0071BD">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="InTrack">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>InTrack - OJK DIY</title>
    
    <!-- Favicon & Touch Icons -->
    <link rel="icon" type="image/png" href="https://ik.imagekit.io/logojkdiy/InTrack%20(1).png?updatedAt=1779620045631">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/logojkdiy/InTrack%20(1).png?updatedAt=1779620045631">
    
    <!-- Placeholder for Dynamic Manifest -->
    <link id="pwa-manifest" rel="manifest" href="">

    <style>
        /* Base Reset */
        *, *::before, *::after { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #F8FAFC; overflow: hidden; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overscroll-behavior-y: none; /* Cegah pull-to-refresh di luar iframe */
        }

        /* Iframe Styling - Fullscreen Spatial Viewport */
        #app-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100dvh; /* Dynamic Viewport untuk Mobile */
            border: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        /* Splash Screen Premium - Redesigned */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.8s;
        }

        .splash-logo {
            width: 130px;
            height: auto;
            margin-bottom: 24px;
            animation: levitate 3s ease-in-out infinite;
            filter: drop-shadow(0 12px 24px rgba(0, 113, 189, 0.15));
        }

        /* Elegant Progress Bar */
        .elegant-loader {
            width: 140px;
            height: 3px;
            background-color: #E2E8F0;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            margin-top: 10px;
        }

        .elegant-loader::after {
            content: '';
            position: absolute;
            left: -40%;
            width: 40%;
            height: 100%;
            background-color: #0071BD;
            border-radius: 4px;
            animation: loading-sweep 1.5s ease-in-out infinite;
        }

        .splash-text {
            margin-top: 24px;
            color: #475569;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.8;
            animation: pulse-text 2s ease-in-out infinite;
        }

        /* Footer Premium dengan Layout Flexbox */
        .footer-brand {
            position: absolute;
            bottom: 32px;
            color: #64748B;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.3px;
            width: 100%;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px; /* Jarak antara icon dan teks */
        }

        .footer-icon {
            color: #94A3B8;
            /* Penyesuaian optikal agar ikon rata tengah dengan teks */
            margin-bottom: 2px; 
        }

        /* Animations */
        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes loading-sweep {
            0% { left: -40%; }
            100% { left: 100%; }
        }
        @keyframes pulse-text {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        /* FIXED: Utility class untuk hide splash (Syntax Error telah dikoreksi) */
        .hidden-splash {
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- Splash Screen UI -->
    <div id="splash-screen">
        <img src="https://ik.imagekit.io/logojkdiy/InTrack%20(1).png?updatedAt=1779620045631" alt="InTrack Logo" class="splash-logo">
        <div class="elegant-loader"></div>
        <div class="splash-text">Menyiapkan Ruang Kerja...</div>
        
        <!-- Footer dengan SVG Instansi & Tata Bahasa Sempurna -->
        <div class="footer-brand">
            <svg class="footer-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
            </svg>
            Dikelola oleh SDM LMSt OJK Daerah Istimewa Yogyakarta
        </div>
    </div>

    <!-- PWA App Wrapper (Tunneling Permissions) -->
    <iframe 
        id="app-frame" 
        src="https://script.google.com/macros/s/AKfycbwZdMdHukQptovu2zYROH1Yg6NQ3VbOivFd_M1CiJiuWOI6rBqrFNQwpVvDrVyle4TR/exec" 
        allow="camera; microphone; geolocation; fullscreen; clipboard-read; clipboard-write"
        allowfullscreen>
    </iframe>

    <script>
        /**
         * ==========================================
         * CORE LOGIC: PWA ENGINE & SPLASH HANDLER
         * ==========================================
         */

        document.addEventListener('DOMContentLoaded', () => {
            const iframe = document.getElementById('app-frame');
            const splash = document.getElementById('splash-screen');
            let isLoaded = false;

            // Fungsi transisi halus
            const revealApp = () => {
                if (isLoaded) return; // Mencegah pemanggilan ganda
                isLoaded = true;
                splash.classList.add('hidden-splash');
                iframe.style.opacity = '1';
            };

            // 1. Handling Iframe Load & Seamless Transition
            iframe.onload = () => {
                // Jeda 400ms memastikan DOM internal GAS telah di-render
                setTimeout(revealApp, 400);
            };

            // 2. Failsafe Timeout (Fallback yang lebih responsif)
            // Jika dalam 6 detik event onload gagal tertangkap (biasa terjadi karena redirect GAS), paksa tampilkan aplikasi.
            setTimeout(revealApp, 6000);

            // 3. Dynamic Manifest Injection (Single File PWA Architecture)
            const appManifest = {
                "name": "InTrack Internship OJK DIY",
                "short_name": "InTrack",
                "start_url": "./index.html",
                "display": "standalone",
                "background_color": "#FFFFFF",
                "theme_color": "#0071BD",
                "orientation": "portrait-primary",
                "icons": [
                    {
                        "src": "https://ik.imagekit.io/logojkdiy/InTrack%20(1).png?updatedAt=1779620045631",
                        "sizes": "192x192",
                        "type": "image/png",
                        "purpose": "any maskable"
                    },
                    {
                        "src": "https://ik.imagekit.io/logojkdiy/InTrack%20(1).png?updatedAt=1779620045631",
                        "sizes": "512x512",
                        "type": "image/png",
                        "purpose": "any maskable"
                    }
                ]
            };

            // Injeksi Manifest PWA yang aman
            const manifestBlob = new Blob([JSON.stringify(appManifest)], { type: 'application/json' });
            const manifestURL = URL.createObjectURL(manifestBlob);
            document.getElementById('pwa-manifest').setAttribute('href', manifestURL);

            // Pendaftaran ServiceWorker eksternal dinonaktifkan untuk mencegah error keamanan "blob: URL" di browser modern.
            if ('serviceWorker' in navigator) {
                console.log('PWA Manifest siap. Fitur Install to Home Screen aktif.');
            }
        });
    </script>
</body>
</html>
