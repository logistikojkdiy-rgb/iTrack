<script>

let settings={APP_NAME:'iTrack Internship OJK DIY',APP_SHORT_NAME:'iTrack',APP_LOGO_URL:DEFAULT_LOGO,OFFICE_NAME:'Kantor OJK DIY',OFFICE_ADDRESS:'Jalan Jenderal Sudirman No. 22, Gowongan, Jetis, Yogyakarta 55232',OFFICE_LATITUDE:-7.7830584,OFFICE_LONGITUDE:110.3687544,OFFICE_RADIUS_METER:100,LATE_AFTER:'08:15',WORK_END_TIME:'17:00'};
let state={today:null,adminAttendance:[],attendanceFilter:'SEMUA'};
const META={'user-home':['Dashboard','Hari ini'],'user-attendance':['Riwayat Absensi','Data saya'],'user-work':['Laporan','Catat kegiatan'],'user-leave':['Izin','Ajukan izin'],'user-profile':['Profil','Data akun'],'admin-home':['Dashboard Admin','Monitoring'],'admin-attendance':['Absensi','Monitoring'],'admin-reports':['Laporan','Validasi'],'admin-leaves':['Izin','Approval'],'admin-users':['Peserta','Data akun'],'admin-settings':['Pengaturan','Sistem']};
const USER_MENUS=[['user-home','Home','home'],['user-attendance','Absensi','camera'],['user-work','Laporan','file'],['user-leave','Izin','calendar'],['user-profile','Profil','user']];
const ADMIN_MENUS=[['admin-home','Home','home'],['admin-attendance','Absensi','camera'],['admin-reports','Laporan','file'],['admin-leaves','Izin','calendar'],['admin-users','Peserta','users'],['admin-settings','Pengaturan','settings']];

document.addEventListener('DOMContentLoaded',()=>{buildAuth();buildApp();buildModals();bindEvents();initDates();setDefaultDates();addWorkItem();loadSystemSettings(true);fetchServerTime(true);restoreSession();setTimeout(()=>document.getElementById('splash').classList.add('hide'),650)});
function buildAuth(){document.getElementById('authPage').innerHTML=`<div class="auth-shell"><aside class="auth-hero"><div><div class="brand-row"><div class="brand-logo"></div><div><b>iTrack</b><br><span>Internship HRIS Platform</span></div></div><h1>Kelola magang dengan alur yang lebih tertib.</h1><p>Absensi live selfie tanpa rekam video, GPS radius, laporan revisi, izin, dan monitoring admin.</p></div><div class="feature-list"><div class="feature"><div class="ico">📷</div><div><b>Live Preview, No Record</b><span>Ambil 1 frame foto dari kamera, bukan video.</span></div></div><div class="feature"><div class="ico">📍</div><div><b>GPS Radius</b><span>Preview map petugas, kantor, jarak, radius, dan akurasi.</span></div></div><div class="feature"><div class="ico">🛠</div><div><b>Manual & Revisi</b><span>Admin input manual, peserta perbaiki laporan revisi.</span></div></div></div></aside><main class="auth-panel">${authTabs()}</main></div>`}
function authTabs(){return `<div id="tabLogin" class="auth-form active"><div class="heading"><h1>Masuk ke iTrack</h1><p>Gunakan akun peserta atau admin.</p></div><form class="stack" id="formLogin"><div class="field"><input id="loginEmail" type="text" placeholder=" " required><label>Email atau username</label></div><div class="field"><input id="loginPassword" type="password" placeholder=" " required><label>Kata sandi</label></div><div class="link-row"><button type="button" class="text-btn" data-auth="tabForgot">Lupa sandi?</button><button type="button" class="text-btn" data-auth="tabRegister">Daftar akun</button></div><button class="btn btn-primary btn-full">Masuk</button><button type="button" class="btn btn-secondary btn-full" data-auth="tabStatus">Cek Status</button></form><div class="auth-note">Kamera absensi memakai live preview dari getUserMedia, tidak menggunakan API perekam.</div></div><div id="tabRegister" class="auth-form"><button class="text-btn" data-auth="tabLogin">Kembali</button><div class="heading" style="margin-top:16px"><h2>Daftar Akun</h2><p>Akun aktif setelah diverifikasi admin.</p></div><form class="stack" id="formRegister"><div class="grid2"><div class="field"><input id="regName" type="text" placeholder=" " required><label>Nama Lengkap</label></div><div class="field"><input id="regUsername" type="text" placeholder=" "><label>Username</label></div></div><div class="grid2"><div class="field"><input id="regEmail" type="email" placeholder=" " required><label>Email</label></div><div class="field"><input id="regPhone" type="tel" placeholder=" "><label>No HP</label></div></div><div class="grid2"><div class="field"><select id="regDivision" required><option>Internship / Magang</option><option>Administrasi</option><option>Pengawasan</option><option>Edukasi dan Perlindungan Konsumen</option><option>Umum</option></select><label>Divisi</label></div><div class="field"><input id="regPosition" type="text" placeholder=" " value="Peserta Internship"><label>Jabatan</label></div></div><div class="grid2"><div class="field"><input id="regPassword" type="password" placeholder=" " minlength="6" required><label>Password</label></div><div class="field"><input id="regPassword2" type="password" placeholder=" " minlength="6" required><label>Konfirmasi</label></div></div><button class="btn btn-primary btn-full">Kirim</button></form></div><div id="tabStatus" class="auth-form"><button class="text-btn" data-auth="tabLogin">Kembali</button><div class="heading" style="margin-top:16px"><h2>Cek Status</h2><p>Masukkan email pendaftaran.</p></div><form class="stack" id="formStatus"><div class="field"><input id="statusEmail" type="email" placeholder=" " required><label>Email</label></div><button class="btn btn-primary btn-full">Cek Status</button></form></div><div id="tabForgot" class="auth-form"><button class="text-btn" data-auth="tabLogin">Kembali</button><div class="heading" style="margin-top:16px"><h2>Lupa Password</h2><p>OTP dikirim ke email akun.</p></div><form class="stack" id="formForgot"><div class="field"><input id="resetIdentity" type="text" placeholder=" " required><label>Username atau Email</label></div><button class="btn btn-primary btn-full">Kirim OTP</button></form></div>`}
function buildApp(){document.getElementById('appPage').innerHTML=`<div class="mobile-top"><div style="display:flex;align-items:center;gap:10px"><div class="logo" style="width:42px;height:42px"></div><b id="mobileAppName">iTrack</b></div><button class="btn btn-secondary" id="btnLogoutMobile">Keluar</button></div><aside class="sidebar"><div class="brand"><div class="logo"></div><div><h3 id="sideAppName">iTrack</h3><p>Internship OJK DIY</p></div></div><div class="office"><b id="sideOfficeName">Kantor OJK DIY</b><span id="sideOfficeAddress"></span><br>Radius: <span id="sideRadius">100</span> meter</div><nav id="sideNav" class="nav"></nav><button class="btn btn-red btn-full" id="btnLogoutSide" style="margin-top:14px">Keluar</button></aside><main class="main"><header class="topbar"><div><h2 id="pageTitle">Dashboard</h2><p id="pageSubtitle">Ringkasan aktivitas</p></div><div class="user-pill"><div id="topAvatar" class="avatar">I</div><div><b id="topName">Pengguna</b><span id="topRole">USER</span></div></div></header><div class="content">${viewUserHome()}${viewAdminHome()}${viewUserAttendance()}${viewUserWork()}${viewUserLeave()}${viewUserProfile()}${viewAdminAttendance()}${viewAdminReports()}${viewAdminLeaves()}${viewAdminUsers()}${viewAdminSettings()}</div></main><nav id="bottomNav" class="bottom-nav"></nav>`}
function viewUserHome(){return `<section id="view-user-home" class="view"><div class="hero"><div><h1 id="userWelcome">Halo</h1><p>Aktivitas hari ini</p></div><div id="todayLabel" class="date-pill">Hari ini</div></div><div class="cards"><div class="card metric"><span>Masuk</span><h2 id="cardCheckInTop">--:--</h2><p>Check-in</p></div><div class="card metric"><span>Pulang</span><h2 id="cardCheckOutTop">--:--</h2><p>Check-out</p></div><div class="card metric"><span>Durasi</span><h2 id="cardDurationTop">0j</h2><p>Hari ini</p></div><div class="card metric"><span>Status</span><h2 id="cardStatusTop">Belum</h2><p>Absensi</p></div></div><div class="layout2"><div><div class="attendance-card"><div class="panel-head"><div><h2>Absensi</h2><p>Live video preview, hanya take picture. Tidak rekam video.</p></div><div id="attendanceDateLabel" class="date-pill" style="background:#fff;color:var(--blue2)">Hari ini</div></div><div class="att-stats"><div class="att-mini"><span>Masuk</span><strong id="cardCheckIn">--:--</strong></div><div class="att-mini"><span>Pulang</span><strong id="cardCheckOut">--:--</strong></div><div class="att-mini"><span>Durasi</span><strong id="cardDuration">0j</strong></div></div><div class="status-strip"><span>Status</span><strong id="cardStatus">Belum</strong></div><div class="status-strip"><span>Lokasi</span><strong id="radiusBadge">GPS belum dicek</strong></div><div class="att-actions"><button class="att-action checkin" id="btnCheckIn"><div class="ico">↘</div><div><h3>Check-in</h3><p>Mulai hari</p></div></button><button class="att-action checkout" id="btnCheckOut"><div class="ico">↗</div><div><h3>Check-out</h3><p>Selesai hari</p></div></button></div><button class="outside-btn" id="btnOutside"><div style="display:flex;align-items:center"><div class="round">⌖</div><div><b>Luar Lokasi</b><span>Dinas atau tugas</span></div></div><b>›</b></button><div id="inlineCamera" class="inline-camera"><div id="cameraPreview" class="cam-view">Kamera belum aktif.</div></div></div></div><div><div class="panel"><div class="panel-head"><div><h2>Akses Cepat</h2><p>Pilih menu</p></div></div><div class="quick-grid"><button class="quick-card" data-open="user-work"><span class="qicon">▤</span><div><b>Laporan</b><span>Catat kegiatan</span></div></button><button class="quick-card" data-open="user-leave"><span class="qicon">□</span><div><b>Izin</b><span>Ajukan izin</span></div></button><button class="quick-card" data-open="user-attendance"><span class="qicon">◉</span><div><b>Riwayat</b><span>Absensi saya</span></div></button><button class="quick-card" data-open="user-profile"><span class="qicon">♙</span><div><b>Profil</b><span>Data akun</span></div></button></div></div><div class="panel"><div class="panel-head"><div><h2>Catatan GPS</h2><p>Gunakan tombol Paskan GPS saat live preview jika jarak/akurasi belum sesuai radius.</p></div></div><div class="gps-check-card"><b>Validasi radius</b><br>Lokasi kantor dan radius diambil dari backend. Preview menampilkan map petugas, map kantor, jarak, dan akurasi GPS.</div></div></div></div></section>`}
function viewAdminHome(){return `<section id="view-admin-home" class="view"><div class="hero"><div><h1>Dashboard Admin</h1><p>Monitoring hari ini</p></div><div id="todayAdminLabel" class="date-pill">Hari ini</div></div><div class="cards"><div class="card metric"><span>Peserta</span><h2 id="sumUsers">0</h2></div><div class="card metric"><span>Hadir</span><h2 id="sumPresent">0</h2></div><div class="card metric"><span>Terlambat</span><h2 id="sumLate">0</h2></div><div class="card metric"><span>Pending</span><h2 id="sumPending">0</h2></div></div><div class="panel"><div class="panel-head"><div><h2>Absensi Terbaru</h2><p>Data terkini</p></div><button class="btn btn-secondary" id="btnRefreshAdminHome">Refresh</button></div><div class="table-wrap"><table class="responsive"><thead><tr><th>No</th><th>Tanggal</th><th>Nama</th><th>Masuk</th><th>Pulang</th><th>Status</th></tr></thead><tbody id="adminHomeAttendanceRows"></tbody></table></div></div></section>`}
function tableSection(id,title,sub,head,bodyId,extra=''){return `<section id="view-${id}" class="view"><div class="panel"><div class="panel-head"><div><h2>${title}</h2><p>${sub}</p></div>${extra}</div><div class="table-wrap"><table class="responsive"><thead><tr>${head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody id="${bodyId}"></tbody></table></div></div></section>`}
function viewUserAttendance(){return tableSection('user-attendance','Riwayat Absensi','Data saya',['No','Tanggal','Masuk','Pulang','Total','Status','Lokasi'],'myAttendanceRows','<button class="btn btn-secondary" id="btnMyAttendance">Refresh</button>')}
function viewUserWork(){return `<section id="view-user-work" class="view"><div class="panel"><div class="panel-head"><div><h2>Laporan</h2><p>Catat kegiatan / perbaiki revisi</p></div><span id="draftStatus" class="badge badge-default">Draft</span></div><form class="stack" id="formWork"><div class="grid2"><div class="field"><input id="workDate" type="date" placeholder=" " required><label>Tanggal</label></div><div class="field"><select id="workDivision" required><option>Internship / Magang</option><option>Administrasi</option><option>Pengawasan</option><option>Edukasi dan Perlindungan Konsumen</option><option>Umum</option></select><label>Divisi</label></div></div><div id="workItems" class="stack"></div><button type="button" class="btn btn-secondary btn-full" id="btnAddWork">Tambah Kegiatan</button><div class="field"><textarea id="workNote" placeholder=" "></textarea><label>Catatan</label></div><div class="grid2"><button type="button" class="btn btn-secondary" id="btnClearDraft">Batal Revisi/Draft</button><button class="btn btn-primary" id="btnSubmitWork">Kirim</button></div></form></div><div class="panel"><div class="panel-head"><div><h2>Riwayat Laporan</h2><p>Status laporan</p></div><button class="btn btn-secondary" id="btnMyReports">Refresh</button></div><div class="table-wrap"><table class="responsive"><thead><tr><th>No</th><th>Tanggal</th><th>Divisi</th><th>Kegiatan</th><th>Durasi</th><th>Status</th><th>Aksi</th></tr></thead><tbody id="myReportRows"></tbody></table></div></div></section>`}
function viewUserLeave(){return `<section id="view-user-leave" class="view"><div class="layout2"><div class="panel"><div class="panel-head"><div><h2>Izin</h2><p>Ajukan izin</p></div></div><form class="stack" id="formLeave"><div class="field"><select id="leaveType" required><option>IZIN_PRIBADI</option><option>SAKIT</option><option>DINAS_LUAR</option><option>CUTI</option><option>LAINNYA</option></select><label>Jenis</label></div><div class="grid2"><div class="field"><input id="leaveStart" type="date" placeholder=" " required><label>Mulai</label></div><div class="field"><input id="leaveEnd" type="date" placeholder=" " required><label>Selesai</label></div></div><div class="field"><textarea id="leaveReason" placeholder=" " required></textarea><label>Alasan</label></div><label class="btn btn-secondary btn-full">Upload Bukti<input id="leaveProof" type="file" accept="image/*" class="file-hidden"></label><button class="btn btn-primary btn-full">Kirim</button></form></div><div class="panel"><div class="panel-head"><div><h2>Riwayat Izin</h2><p>Status izin</p></div><button class="btn btn-secondary" id="btnMyLeaves">Refresh</button></div><div class="table-wrap"><table class="responsive"><thead><tr><th>No</th><th>Tanggal</th><th>Jenis</th><th>Periode</th><th>Status</th></tr></thead><tbody id="myLeaveRows"></tbody></table></div></div></div></section>`}
function viewUserProfile(){return `<section id="view-user-profile" class="view"><div class="hero"><div><h1>Profil</h1><p>Data akun</p></div><div class="date-pill">Peserta</div></div><div class="panel"><form class="stack" id="formProfile"><div class="grid2"><div class="field"><input id="profileFullName" type="text" placeholder=" " required><label>Nama Lengkap</label></div><div class="field"><input id="profileUsername" type="text" placeholder=" " readonly><label>Username</label></div></div><div class="grid2"><div class="field"><input id="profileEmail" type="email" placeholder=" " required><label>Email</label></div><div class="field"><input id="profilePhone" type="tel" placeholder=" "><label>No HP</label></div></div><div class="grid2"><div class="field"><select id="profileDivision" required><option>Internship / Magang</option><option>Administrasi</option><option>Pengawasan</option><option>Edukasi dan Perlindungan Konsumen</option><option>Umum</option><option>Admin Sistem</option></select><label>Divisi</label></div><div class="field"><input id="profilePosition" type="text" placeholder=" "><label>Jabatan</label></div></div><button class="btn btn-primary btn-full">Simpan</button></form></div></section>`}
function viewAdminAttendance(){return `<section id="view-admin-attendance" class="view"><div class="panel"><div class="panel-head"><div><h2>Monitoring Absensi</h2><p>Filter data, validasi, dan input manual</p></div></div><div class="grid3" style="margin-bottom:12px"><div class="field"><input id="attStart" type="date" placeholder=" "><label>Dari</label></div><div class="field"><input id="attEnd" type="date" placeholder=" "><label>Sampai</label></div><div class="field"><select id="attPerson" required><option value="">Semua Peserta</option></select><label>Peserta</label></div></div><div class="grid3" style="margin-bottom:12px"><button class="btn btn-primary" id="btnLoadAdminAttendance">Filter</button><button class="btn btn-secondary" id="btnExportAttendancePdf">Export PDF</button><button class="btn btn-orange" id="btnOpenManualAttendance">Input Manual</button></div><div class="table-wrap"><table class="responsive"><thead><tr><th>No</th><th>Tanggal</th><th>Nama</th><th>Divisi</th><th>Masuk</th><th>Pulang</th><th>Total</th><th>Status</th><th>Maps</th><th>Aksi</th></tr></thead><tbody id="adminAttendanceRows"></tbody></table></div></div></section>`}
function viewAdminReports(){return tableSection('admin-reports','Validasi Laporan','Review laporan',['No','Tanggal','Nama','Divisi','Kegiatan','Durasi','Status','Aksi'],'adminReportRows','<button class="btn btn-secondary" id="btnLoadAdminReports">Refresh</button>')}

function openManualAttendanceModal(){setValue('manualDate',toDateInput(new Date()));setValue('manualCheckIn','08:00');setValue('manualCheckOut','17:00');setValue('manualReason','');populateManualUserOptions();document.getElementById('manualModal').classList.add('show')}async function populateManualUserOptions(){try{const res=await api('getUsersForAdmin',{});if(!res.success)return;const users=res.data||[],select=document.getElementById('manualUser');select.innerHTML='<option value="">Pilih Peserta</option>'+users.filter(u=>!isAdminRole(u.ROLE)).map(u=>'<option value="'+escAttr(u.USER_ID)+'">'+esc(u.NAMA_LENGKAP||u.USERNAME)+' - '+esc(u.DIVISI||'-')+'</option>').join('')}catch(e){toast('Data peserta gagal','Tidak bisa memuat daftar peserta.','warning')}}
async function submitManualAttendance(e){e.preventDefault();if(!currentRoleIsAdmin)return toast('Akses ditolak','Hanya admin.','error');const payload={userId:val('manualUser'),tanggal:val('manualDate'),jamMasuk:val('manualCheckIn'),jamPulang:val('manualCheckOut'),statusKehadiran:val('manualStatus'),alasanManual:val('manualReason'),inputBy:currentUser?currentUser.USERNAME:''};if(!payload.userId)return toast('Peserta wajib dipilih','Pilih peserta.','warning');if(!payload.alasanManual)return toast('Alasan wajib diisi','Untuk audit manual.','warning');showLoading('Menyimpan absensi manual...','Memproses data.');try{const res=await api('submitManualAttendance',payload);if(!res.success)throw new Error(res.message);document.getElementById('manualModal').classList.remove('show');toast('Absensi manual tersimpan',res.message,'success');loadAdminAttendance();loadDashboardSummary()}catch(err){toast('Gagal menyimpan',err.message,'error')}finally{hideLoading()}}
async function loadAdminReports(){try{const res=await api('getWorkReportsForAdmin',{});if(res.success)renderAdminReports(res.data||[])}catch(e){}}function renderAdminReports(rows){const tb=document.getElementById('adminReportRows');if(!tb)return;if(!rows.length){tb.innerHTML='<tr><td colspan="8"><div class="empty">Tidak ada laporan.</div></td></tr>';return}tb.innerHTML=rows.map((r,i)=>{const id=escAttr(r.REPORT_ID);const act='<button class="btn btn-green btn-mini report-action" data-id="'+id+'" data-status="DISETUJUI">Setujui</button> <button class="btn btn-orange btn-mini report-action" data-id="'+id+'" data-status="REVISI">Revisi</button> <button class="btn btn-red btn-mini report-action" data-id="'+id+'" data-status="DITOLAK">Tolak</button>';return rowHtml([i+1,formatDateID(r.TANGGAL),r.NAMA_LENGKAP||'-',r.DIVISI||'-',r.TOTAL_KEGIATAN||0,r.TOTAL_DURASI||'-',badge(r.STATUS_LAPORAN),act],['No','Tanggal','Nama','Divisi','Kegiatan','Durasi','Status','Aksi'])}).join('');document.querySelectorAll('.report-action').forEach(b=>b.addEventListener('click',()=>validateReport(b.dataset.id,b.dataset.status)))}async function validateReport(id,status){const note=prompt('Catatan admin (opsional):','')||'';showLoading('Memvalidasi laporan...','Memperbarui status.');try{const res=await api('validateWorkReport',{reportId:id,status,validatedBy:currentUser.USERNAME,catatanAdmin:note});if(!res.success)throw new Error(res.message);toast('Berhasil',res.message,'success');loadAdminReports()}catch(e){toast('Gagal',e.message,'error')}finally{hideLoading()}}
async function loadAdminLeaves(){try{const res=await api('getLeavesForAdmin',{});if(res.success)renderAdminLeaves(res.data||[])}catch(e){}}function renderAdminLeaves(rows){const tb=document.getElementById('adminLeaveRows');if(!tb)return;if(!rows.length){tb.innerHTML='<tr><td colspan="8"><div class="empty">Tidak ada izin.</div></td></tr>';return}tb.innerHTML=rows.map((r,i)=>rowHtml([i+1,formatDateID(r.TANGGAL_PENGAJUAN),r.NAMA_LENGKAP||'-',r.JENIS_IZIN||'-',formatDateID(r.TANGGAL_MULAI)+' s.d. '+formatDateID(r.TANGGAL_SELESAI),r.ALASAN||'-',badge(r.STATUS_APPROVAL),'-'],['No','Tanggal','Nama','Jenis','Periode','Alasan','Status','Aksi'])).join('')}
async function loadUsers(){try{const res=await api('getUsersForAdmin',{});if(res.success)renderUsers(res.data||[])}catch(e){}}function renderUsers(rows){const tb=document.getElementById('userRows');if(!tb)return;if(!rows.length){tb.innerHTML='<tr><td colspan="7"><div class="empty">Tidak ada peserta.</div></td></tr>';return}tb.innerHTML=rows.map((r,i)=>rowHtml([i+1,r.NAMA_LENGKAP||'-',r.USERNAME||'-',r.EMAIL||'-',r.ROLE||'-',r.DIVISI||'-',badge(r.STATUS_AKUN)],['No','Nama','Username','Email','Role','Divisi','Status'])).join('')}
async function exportAttendancePdf(){showLoading('Membuat PDF absensi...','File dibuat di backend.');try{const res=await api('exportAttendancePdf',{startDate:val('attStart'),endDate:val('attEnd'),officerName:val('attPerson'),exportedBy:currentUser?currentUser.USERNAME:''});if(!res.success)throw new Error(res.message);toast('Export berhasil','PDF absensi dibuat.','success');if(res.data&&res.data.fileUrl)window.open(res.data.fileUrl,'_blank')}catch(e){toast('Export gagal',e.message,'error')}finally{hideLoading()}}
function compressImageFile(file,maxWidth,quality,mirror){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const ratio=Math.min(maxWidth/img.width,1),nw=Math.round(img.width*ratio),nh=Math.round(img.height*ratio),canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');canvas.width=nw;canvas.height=nh;if(mirror){ctx.translate(nw,0);ctx.scale(-1,1)}ctx.drawImage(img,0,0,nw,nh);resolve(canvas.toDataURL('image/jpeg',quality||.58))};img.onerror=()=>reject(new Error('File gambar tidak valid.'));img.src=e.target.result};reader.onerror=()=>reject(new Error('Gagal membaca file.'));reader.readAsDataURL(file)})}
function updateUserUI(){text('topName',currentUser.NAMA_LENGKAP||currentUser.USERNAME);text('topRole',(currentUser.ROLE||'-')+' • '+(currentUser.STATUS_AKUN||'-'));const av=document.getElementById('topAvatar');av.textContent=(currentUser.NAMA_LENGKAP||currentUser.USERNAME||'I').charAt(0).toUpperCase()}function normalizeUser(u){u=u||{};return{USER_ID:u.USER_ID||u.userId||'',USERNAME:u.USERNAME||u.username||'',NAMA_LENGKAP:u.NAMA_LENGKAP||u.namaLengkap||u.name||'',ROLE:u.ROLE||u.role||'',STATUS_AKUN:u.STATUS_AKUN||u.statusAkun||u.status||'',EMAIL:u.EMAIL||u.email||'',DIVISI:u.DIVISI||u.divisi||'',JABATAN:u.JABATAN||u.jabatan||'',NO_HP:u.NO_HP||u.noHp||''}}
function isAdminRole(r){r=String(r||'').toUpperCase();return['SUPER_ADMIN','SUPERADMIN','ADMIN','SUPERVISOR'].includes(r)}function initDates(){const now=new Date();text('todayLabel',formatLongDate(now));text('todayAdminLabel',formatLongDate(now));text('attendanceDateLabel',formatLongDate(now))}function setDefaultDates(){const d=toDateInput(new Date());['workDate','leaveStart','leaveEnd','attStart','attEnd','manualDate'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=d})}
function badge(v){const raw=String(v||'-'),s=raw.toUpperCase();let c='badge-default';if(['AKTIF','HADIR','DISETUJUI','VALID','SELESAI'].some(x=>s.includes(x)))c='badge-success';if(['TERLAMBAT','MENUNGGU','REVISI','REVSI','PERLU_REVIEW','PERLU_REVISI'].some(x=>s.includes(x)))c='badge-warning';if(['IZIN','SAKIT','DINAS_LUAR','MANUAL'].some(x=>s.includes(x)))c='badge-info';if(['DITOLAK','NONAKTIF','ALPHA','INVALID'].some(x=>s.includes(x)))c='badge-danger';return'<span class="badge '+c+'">'+esc(displayStatus(raw))+'</span>'}function displayStatus(s){return String(s||'-').replace(/_/g,' ').toLowerCase().replace(/(^|\s)\S/g,a=>a.toUpperCase())}function rowHtml(values,labels){return'<tr>'+values.map((v,i)=>'<td data-label="'+esc(labels[i])+'">'+(v==null?'':v)+'</td>').join('')+'</tr>'}function val(id){const el=document.getElementById(id);return el?String(el.value||'').trim():''}function setValue(id,v){const el=document.getElementById(id);if(el)el.value=v||''}function text(id,v){const el=document.getElementById(id);if(el)el.textContent=v==null?'':v}function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function escAttr(v){return esc(v).replace(/`/g,'&#096;')}function toDateInput(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}function formatDateID(v){if(!v)return'-';const s=String(v).split(' ')[0],p=s.split('-');if(p.length===3)return p[2]+'/'+p[1]+'/'+p[0];return s}function formatLongDate(d){return d.toLocaleDateString('id-ID',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}function formatDateTimeID(d){return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}function onlyTime(v){if(!v)return'--:--';const m=String(v).match(/(\d{1,2}):(\d{2})/);return m?String(m[1]).padStart(2,'0')+':'+m[2]:String(v)}function serverTimeDisplay(){if(serverTimeData&&serverTimeData.serverNowDisplay)return serverTimeData.serverNowDisplay;return formatDateTimeID(new Date())+' WIB'}function shortDuration(v){return String(v||'0 jam 0 menit').replace(' jam ','j ').replace(' menit','m')}function distanceMeters(a,b,c,d){const R=6371000,rad=x=>x*Math.PI/180,dl=rad(c-a),dn=rad(d-b),x=Math.sin(dl/2)*Math.sin(dl/2)+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(dn/2)*Math.sin(dn/2);return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
